  color: #1a1a1a;
}
.app-wrapper { max-width: 420px; margin: 0 auto; min-height: 100vh; background: #fff; }

/* HEADER */
.app-header {
  background: #111;
  padding: 0.75rem 1rem;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 3px solid #f5a623;
}
.app-header .logo-img { width: 44px; height: 44px; object-fit: contain; flex-shrink: 0; }
.app-header .brand { flex: 1; }
.app-header .brand h1 {
  font-family: 'VanguardCF', sans-serif;
  font-size: 18px; color: #f5a623; letter-spacing: 1px; line-height: 1;
}
.app-header .brand p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
.conn-dot.ok { background: #4caf50; }

/* LANG SELECTOR */
.lang-select-wrap { position: relative; }
.lang-btn {
  background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.4);
  border-radius: 8px; padding: 5px 8px; cursor: pointer; display: flex;
  align-items: center; gap: 4px; color: #f5a623; font-size: 13px;
}
.lang-btn:hover { background: rgba(245,166,35,0.25); }
.lang-menu {
  position: absolute; top: calc(100% + 6px); right: 0; background: #fff;
  border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  min-width: 160px; overflow: hidden; display: none; z-index: 20;
}
.lang-menu.open { display: block; }
.lang-option {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px;
  cursor: pointer; font-size: 14px; color: #1a1a1a; background: #fff; border: none; width: 100%; text-align: left;
}
.lang-option:hover { background: #f4f5f7; }
.lang-option.selected { background: #fff8e1; color: #e65100; font-weight: 500; }
.lang-flag { font-size: 18px; }

/* TABS */
.tabs { display: flex; border-bottom: 2px solid #f5a623; background: #111; }
.tab { flex: 1; padding: 0.7rem 0.5rem; text-align: center; font-size: 12px; color: rgba(255,255,255,0.5); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: color 0.15s; }
.tab.active { color: #f5a623; border-bottom-color: #f5a623; }
.tab i { display: block; font-size: 18px; margin-bottom: 2px; }

/* SECTIONS */
.section { padding: 1rem 1rem 0; display: none; }
.section.active { display: block; }

/* FIELDS */
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.field label .req { color: #f5a623; margin-left: 2px; }
.field input, .field textarea, .field select {
  width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px;
  padding: 0.6rem 0.75rem; font-size: 15px; color: #1a1a1a;
  background: #fff; font-family: inherit;
}
.field textarea { resize: none; min-height: 80px; line-height: 1.5; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: #f5a623; box-shadow: 0 0 0 3px rgba(245,166,35,0.15); }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

/* PHOTO */
.photo-zone { border: 1.5px dashed #e5e7eb; border-radius: 8px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; position: relative; overflow: hidden; background: #f9fafb; }
.photo-zone:hover { border-color: #f5a623; }
.photo-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.photo-zone i { font-size: 28px; color: #9ca3af; display: block; margin-bottom: 6px; }
.photo-zone p { font-size: 13px; color: #6b7280; }
.photo-zone.has-photo { border-style: solid; border-color: #f5a623; }
.photo-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 6px; display: none; }

/* QTY */
.qty-control { display: flex; align-items: center; border: 1.5px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
.qty-btn { width: 40px; height: 40px; border: none; background: #f9fafb; font-size: 20px; cursor: pointer; color: #1a1a1a; display: flex; align-items: center; justify-content: center; }
.qty-btn:hover { background: #f5a623; color: #fff; }
.qty-num { flex: 1; text-align: center; font-size: 16px; font-weight: 600; border: none; border-left: 1.5px solid #e5e7eb; border-right: 1.5px solid #e5e7eb; background: #fff; color: #1a1a1a; padding: 0; height: 40px; }

/* PRIORITY */
.priority-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; border: 1.5px solid #e5e7eb; cursor: pointer; color: #6b7280; background: #fff; transition: all 0.15s; }
.pill.active-normal { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
.pill.active-urgent { background: #fff3e0; border-color: #ff9800; color: #e65100; }
.pill.active-blocking { background: #fce4ec; border-color: #e91e63; color: #880e4f; }

/* SUBMIT */
.submit-btn {
  width: 100%; margin-top: 1.25rem; padding: 0.95rem;
  background: #f5a623; border: none; border-radius: 8px;
  color: #111; font-size: 16px; font-weight: 700;
  font-family: 'VanguardCF', sans-serif; letter-spacing: 1px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity 0.15s;
}
.submit-btn:hover { opacity: 0.88; }
.submit-btn:disabled { opacity: 0.45; cursor: not-allowed; }

/* BANNERS */
.success-banner { display: none; margin: 1rem; padding: 1rem; background: #e8f5e9; border: 1px solid #4caf50; border-radius: 8px; text-align: center; }
.success-banner i { font-size: 28px; color: #4caf50; display: block; margin-bottom: 6px; }
.success-banner p { font-size: 14px; color: #2e7d32; }

/* HISTORY */
.history-list { padding: 0; }
.hist-item { background: #fff; border: 1px solid #e5e7eb; border-left: 4px solid #f5a623; border-radius: 8px; padding: 0.75rem 1rem; margin-bottom: 0.75rem; }
.hi-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.hi-desc { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.hi-date { font-size: 11px; color: #9ca3af; }
.hi-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-normal { background: #e8f5e9; color: #2e7d32; }
.badge-urgent { background: #fff3e0; color: #e65100; }
.badge-blocking { background: #fce4ec; color: #880e4f; }
.badge-qty { background: #f3f4f6; color: #6b7280; }

/* CONFIG */
.config-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
.config-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 0.75rem; color: #1a1a1a; display: flex; align-items: center; gap: 6px; }
.config-card input[type=url], .config-card input[type=text], .config-card input[type=password] {
  width: 100%; border: 1.5px solid #e5e7eb; border-radius: 8px;
  padding: 0.6rem 0.75rem; font-size: 13px; margin-bottom: 8px;
  background: #fff; color: #1a1a1a; font-family: inherit;
}
.config-card input:focus { outline: none; border-color: #f5a623; }
.save-btn { width: 100%; padding: 0.65rem; background: #111; color: #f5a623; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 700; font-family: 'VanguardCF', sans-serif; letter-spacing: 0.5px; }
.save-btn:hover { background: #f5a623; color: #111; }
.config-status { font-size: 12px; margin-top: 8px; padding: 6px 10px; border-radius: 8px; text-align: center; }
.config-status.ok { background: #e8f5e9; color: #2e7d32; }
.config-status.err { background: #fce4ec; color: #880e4f; }
.info-box { background: #fff8e1; border: 1px solid #f5a623; border-radius: 8px; padding: 0.75rem 1rem; font-size: 12px; color: #7c4a00; line-height: 1.6; margin-bottom: 0.75rem; }
.step-item { display: flex; gap: 10px; margin-bottom: 0.7rem; align-items: flex-start; }
.step-num { width: 20px; height: 20px; min-width: 20px; background: #f5a623; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #111; margin-top: 1px; }
.step-text { font-size: 12.5px; color: #6b7280; line-height: 1.5; }
.step-text strong { color: #1a1a1a; }
.empty-state { text-align: center; padding: 2rem 0; color: #9ca3af; }
.empty-state i { font-size: 36px; display: block; margin-bottom: 8px; }

/* PIN OVERLAY */
.pin-overlay {
  position: fixed; inset: 0; background: rgba(17,17,17,0.92);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.pin-box {
  background: #fff; border-radius: 16px; padding: 2rem 1.5rem;
  width: 300px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.pin-box .pin-logo { width: 60px; margin: 0 auto 0.75rem; display: block; }
.pin-box h2 { font-family: 'VanguardCF', sans-serif; font-size: 20px; color: #111; margin-bottom: 4px; }
.pin-box p { font-size: 13px; color: #6b7280; margin-bottom: 1.25rem; }
.pin-dots { display: flex; justify-content: center; gap: 10px; margin-bottom: 1.25rem; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; background: #e5e7eb; transition: background 0.15s; }
.pin-dot.filled { background: #f5a623; }
.pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pin-key {
  padding: 0.75rem; border: 1.5px solid #e5e7eb; border-radius: 10px;
  font-size: 18px; font-weight: 600; cursor: pointer; background: #fff;
  color: #1a1a1a; transition: all 0.12s;
}
.pin-key:hover { background: #f5a623; border-color: #f5a623; color: #111; }
.pin-key.del { font-size: 15px; color: #6b7280; }
.pin-error { color: #e91e63; font-size: 13px; margin-top: 0.75rem; min-height: 20px; }
</style>
</head>

const flags = { fr:"🇫🇷", en:"🇬🇧", es:"🇪🇸", nl:"🇧🇪" };
let currentLang = localStorage.getItem('virage_lang') || 'fr';

function t(k){ return (translations[currentLang]&&translations[currentLang][k])||translations.en[k]||k; }

function applyTranslations(){
  document.documentElement.lang = currentLang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.innerHTML=t(el.getAttribute('data-i18n')); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{ el.setAttribute('placeholder',t(el.getAttribute('data-i18n-placeholder'))); });
  document.getElementById('langFlagCurrent').textContent = flags[currentLang];
  document.querySelectorAll('.lang-option').forEach(o=>o.classList.toggle('selected',o.getAttribute('data-lang')===currentLang));
  document.getElementById('pinOverlay').querySelector('p[data-i18n]') && (document.getElementById('pinOverlay').querySelector('p[data-i18n]').textContent = t('pinPrompt'));
  updateConnStatus();
  renderHistory();
}

function setLang(l){ currentLang=l; localStorage.setItem('virage_lang',l); document.getElementById('langMenu').classList.remove('open'); applyTranslations(); }
function toggleLangMenu(){ document.getElementById('langMenu').classList.toggle('open'); }
document.addEventListener('click',e=>{ if(!document.querySelector('.lang-select-wrap').contains(e.target)) document.getElementById('langMenu').classList.remove('open'); });

/* ===== PIN ===== */
const DEFAULT_PIN = '1205';
let pinBuffer = '';
let pinTarget = null;

function getPin(){ return localStorage.getItem('virage_pin') || DEFAULT_PIN; }

function requestConfig(){
  if(sessionStorage.getItem('virage_pin_ok')==='1'){ switchTab('config'); return; }
  pinBuffer=''; pinTarget='config';
  updatePinDots();
  document.getElementById('pinError').textContent='';
  document.getElementById('pinOverlay').style.display='flex';
}

function pinPress(d){
  if(pinBuffer.length>=4) return;
  pinBuffer+=d;
  updatePinDots();
  if(pinBuffer.length===4) setTimeout(checkPin,150);
}

function pinDel(){ if(pinBuffer.length>0){ pinBuffer=pinBuffer.slice(0,-1); updatePinDots(); } }

function pinCancel(){
  document.getElementById('pinOverlay').style.display='none';
  pinBuffer='';
  updatePinDots();
}

function updatePinDots(){
  for(let i=0;i<4;i++){
    document.getElementById('dot'+i).classList.toggle('filled', i<pinBuffer.length);
  }
}

function checkPin(){
  if(pinBuffer===getPin()){
    sessionStorage.setItem('virage_pin_ok','1');
    document.getElementById('pinOverlay').style.display='none';
    pinBuffer=''; updatePinDots();
    switchTab('config');
  } else {
    document.getElementById('pinError').textContent=t('pinWrong');
    pinBuffer=''; updatePinDots();
  }
}

function savePin(){
  const np = document.getElementById('cfgNewPin').value.trim();
  const ps = document.getElementById('pinStatus');
  if(!/^\d{4}$/.test(np)){ ps.className='config-status err'; ps.textContent=t('pinInvalid'); return; }
  localStorage.setItem('virage_pin', np);
  document.getElementById('cfgNewPin').value='';
  ps.className='config-status ok'; ps.textContent=t('pinChanged');
  setTimeout(()=>ps.textContent='',3000);
}

/* ===== APP ===== */
let currentPriority = 'Normal';
let photoData = null;
let appHistory = JSON.parse(localStorage.getItem('virage_history') || '[]');
let cfg = JSON.parse(localStorage.getItem('virage_cfg') || '{}');
if (!cfg.scriptUrl) { cfg.scriptUrl = 'https://script.google.com/macros/s/AKfycbzj2J_m7aF2OYvUWmT152T9xdiIEtVEKSdGIDj-TvdMG5ue4wzQDbo2DBZtiQBdp305/exec'; localStorage.setItem('virage_cfg', JSON.stringify(cfg)); }
if (!localStorage.getItem('virage_pin')) { localStorage.setItem('virage_pin', '1205'); }

document.getElementById('dateRequest').value = new Date().toISOString().split('T')[0];
if(cfg.mechName){ document.getElementById('mechName').value=cfg.mechName; document.getElementById('cfgMech').value=cfg.mechName; }
if(cfg.scriptUrl) document.getElementById('cfgUrl').value=cfg.scriptUrl;

applyTranslations();

function updateConnStatus(){
  const dot=document.getElementById('connDot'), label=document.getElementById('connLabel');
  dot.className = cfg.scriptUrl ? 'conn-dot ok' : 'conn-dot';
  label.textContent = cfg.scriptUrl ? t('connOk') : t('connGoToConfig');
}

function switchTab(name){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('section-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

function changeQty(d){ const el=document.getElementById('qty'); el.value=Math.max(1,(parseInt(el.value)||1)+d); }

function setPriority(p,btn){
  currentPriority=p;
  document.querySelectorAll('.pill').forEach(x=>x.className='pill');
  btn.classList.add('active-'+p.toLowerCase());
}

function handlePhoto(input){
  if(!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=700, LIMIT=45000;
      let {width,height}=img;
      if(width>height&&width>MAX){height=Math.round(height*(MAX/width));width=MAX;}
      else if(height>MAX){width=Math.round(width*(MAX/height));height=MAX;}
      const canvas=document.createElement('canvas');
      canvas.width=width; canvas.height=height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,width,height);
      let q=0.7, dataUrl=canvas.toDataURL('image/jpeg',q);
      while(dataUrl.length>LIMIT&&q>0.2){ q-=0.1; dataUrl=canvas.toDataURL('image/jpeg',q); }
      if(dataUrl.length>LIMIT){
        const sc=Math.sqrt(LIMIT/dataUrl.length);
        canvas.width=Math.max(100,Math.round(width*sc));
        canvas.height=Math.max(100,Math.round(height*sc));
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        dataUrl=canvas.toDataURL('image/jpeg',0.5);
      }
      photoData=dataUrl;
      document.getElementById('photoPreview').src=photoData;
      document.getElementById('photoPreview').style.display='block';
      document.getElementById('photoIcon').style.display='none';
      document.getElementById('photoText').style.display='none';
      document.getElementById('photoZone').classList.add('has-photo');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function saveConfig(){
  cfg.scriptUrl=document.getElementById('cfgUrl').value.trim();
  localStorage.setItem('virage_cfg',JSON.stringify(cfg));
  updateConnStatus();
  const el=document.getElementById('configStatus');
  el.className='config-status ok'; el.textContent=t('configSaved');
  setTimeout(()=>el.textContent='',3000);
}

function saveMech(){
  cfg.mechName=document.getElementById('cfgMech').value.trim();
  localStorage.setItem('virage_cfg',JSON.stringify(cfg));
  document.getElementById('mechName').value=cfg.mechName;
}

async function submitForm(){
  const dateReq=document.getElementById('dateRequest').value;
  const dateWant=document.getElementById('dateWanted').value;
  const desc=document.getElementById('description').value.trim();
  const qty=document.getElementById('qty').value;
  const unit=document.getElementById('unit').value;
  const mech=document.getElementById('mechName').value.trim();
  if(!dateReq||!dateWant||!desc){ alert(t('alertRequired')); return; }
  cfg.mechName=mech; localStorage.setItem('virage_cfg',JSON.stringify(cfg));

  // Always send English values to Sheets regardless of UI language
  const priorityEN = currentPriority; // already stored in English (Normal/Urgent/Blocking)

  const entry={
    dateRequest:dateReq, dateWanted:dateWant, description:desc,
    qty:qty+' '+unit, priority:priorityEN, mechanic:mech,
    status:'Pending', photo:photoData?'Yes':'No'
  };

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader"></i>'+t('sending');

  if(cfg.scriptUrl){
    try{
      await fetch(cfg.scriptUrl,{
        method:'POST', mode:'no-cors',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({...entry, photo: photoData||'No photo'})
      });
    }catch(e){}
  }

  appHistory.unshift({...entry,id:Date.now()});
  localStorage.setItem('virage_history',JSON.stringify(appHistory.slice(0,50)));
  document.getElementById('successBanner').style.display='block';
  setTimeout(()=>{ document.getElementById('successBanner').style.display='none'; },4000);
  document.getElementById('description').value='';
  document.getElementById('qty').value='1';
  document.getElementById('dateWanted').value='';
  photoData=null;
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('photoIcon').style.display='block';
  document.getElementById('photoText').style.display='block';
  document.getElementById('photoZone').classList.remove('has-photo');
  setPriority('Normal',document.getElementById('pill-normal'));
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-send"></i> <span>'+t('btnSubmit')+'</span>';
  renderHistory();
  setTimeout(()=>switchTab('history'),1500);
}

function renderHistory(){
  const el=document.getElementById('historyList');
  if(!appHistory.length){ el.innerHTML='<div class="empty-state"><i class="ti ti-inbox"></i><p>'+t('emptyHistory')+'</p></div>'; return; }
  el.innerHTML=appHistory.map(h=>{
    const pc=h.priority==='Normal'?'badge-normal':h.priority==='Urgent'?'badge-urgent':'badge-blocking';
    return '<div class="hist-item"><div class="hi-top"><span class="hi-desc">'+(h.description.length>38?h.description.slice(0,38)+'…':h.description)+'</span><span class="hi-date">'+h.dateRequest+'</span></div><div class="hi-meta"><span class="badge '+pc+'">'+h.priority+'</span><span class="badge badge-qty">'+h.qty+'</span>'+(h.mechanic?'<span class="badge badge-qty">'+h.mechanic+'</span>':'')+'</div><div style="font-size:11px;color:#9ca3af;margin-top:4px">'+t('wantedLabel')+h.dateWanted+'</div></div>';
  }).join('');
}
</script>
